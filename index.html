<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicWorld - अनलिमिटेड इमेज सर्च इंजन</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* प्ले स्टोर ऐप जैसा पिंटरेस्ट गैलरी ग्रिड */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 10px;
            gap: 12px;
        }
        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 16px;
            }
        }
        .gallery-item {
            grid-row-end: span 24;
            break-inside: avoid;
        }
        .gallery-item:nth-child(2n) { grid-row-end: span 32; }
        .gallery-item:nth-child(3n) { grid-row-end: span 36; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <header class="sticky top-0 bg-white/95 backdrop-blur-md shadow-md z-50 py-4 px-4 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-gray-200">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white p-2 rounded-2xl font-black text-2xl w-12 h-12 flex items-center justify-center shadow-md">P</div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight text-blue-600">PicWorld</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">अनलिमिटेड लाइव सर्च</p>
            </div>
        </div>
        
        <form id="search-form" class="w-full sm:w-7/12 flex items-center bg-gray-50 p-2 rounded-full border border-gray-300 focus-within:border-blue-500 focus-within:bg-white transition-all shadow-inner">
            <div class="pl-3 text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input type="text" id="search-input" placeholder="कुछ भी लिखें... जैसे क्रिकेट, वॉलपेपर, धोनी, कोहली..." class="w-full bg-transparent outline-none px-3 text-gray-700 font-medium">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-blue-700 transition active:scale-95">खोजें</button>
        </form>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        
        <div class="flex flex-wrap gap-2 mb-4 justify-center sm:justify-start items-center">
            <button onclick="quickSearch('Indian Cricket Team')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-xs font-semibold transition shadow-sm">🏏 क्रिकेट</button>
            <button onclick="quickSearch('Suryakumar Yadav')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-xs font-semibold transition shadow-sm">🔥 SKY</button>
            <button onclick="quickSearch('HD Nature Wallpaper')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-xs font-semibold transition shadow-sm">🌿 प्रकृति</button>
            <button onclick="quickSearch('Supercars')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-xs font-semibold transition shadow-sm">🏎️ कारें</button>
        </div>

        <div id="status-message" class="text-center text-gray-500 my-12 text-lg font-semibold hidden">
            <div class="inline-block w-6 h-6 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mr-2"></div>
            ताज़ा फोटोज़ निकाली जा रही हैं...
        </div>
        
        <div id="gallery" class="gallery-grid"></div>
    </main>

    <script>
        const gallery = document.getElementById('gallery');
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const statusMessage = document.getElementById('status-message');

        // इमेज सर्च मैन की तरह अनलिमिटेड फोटोज़ सीधे लाइव सर्वर से खींचना
        async function fetchLiveImages(query = 'Indian cricket team') {
            statusMessage.classList.remove('hidden');
            
            try {
                const imageUrls = [];
                const totalImagesNeeded = 36; // स्क्रीन को पूरा भरने के लिए 36 शानदार फोटोज़

                for (let i = 1; i <= totalImagesNeeded; i++) {
                    // Unsplash Source का एकदम नया लाइव रैंडमाइज़र लिंक जो कभी डुप्लीकेट या ब्लैंक इमेज नहीं देगा
                    const randomId = Math.floor(Math.random() * 5000) + i;
                    imageUrls.push(`https://images.unsplash.com/featured/?${encodeURIComponent(query)}&sig=${randomId}`);
                }

                displayImages(imageUrls);
                statusMessage.classList.add('hidden');
            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = "समस्या आई, कृपया दोबारा सर्च करें।";
            }
        }

        // स्क्रीन पर कार्ड्स को सुंदर तरीके से सजाना
        function displayImages(urls) {
            gallery.innerHTML = '';
            
            urls.forEach((url, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "gallery-item relative overflow-hidden rounded-xl bg-white group cursor-pointer shadow hover:shadow-xl hover:-translate-y-0.5 transition-all duration-300 border border-gray-200";
                
                itemDiv.innerHTML = `
                    <img src="${url}" alt="PicWorld Result" class="w-full h-full object-cover rounded-xl group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="handleImageError(this)">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
                        <div class="flex justify-between items-center gap-2">
                            <a href="${url}" target="_blank" class="bg-white text-gray-900 px-3 py-2 rounded-lg flex items-center gap-1.5 font-bold text-[11px] shadow-md active:scale-95 transition">
                                <i class="fa-solid fa-arrow-down text-blue-600"></i> डाउनलोड
                            </a>
                            
                            <button onclick="shareImage('${url}')" class="bg-blue-600 hover:bg-blue-700 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-md active:scale-95 transition">
                                <i class="fa-solid fa-share-nodes text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
                gallery.appendChild(itemDiv);
            });
        }

        // यदि कोई इमेज लाइव लोड होने में फेल हो जाए, तो वह खाली सफ़ेद स्पेस न छोड़े बल्कि उसकी जगह एक शानदार बैकअप वॉलपेपर लोड कर दे
        function handleImageError(image) {
            const backupImages = [
                "https://images.unsplash.com/photo-1540747737956-378724044432?w=600&auto=format&fit=crop", // क्रिकेट स्टेडियम बैकअप
                "https://images.unsplash.com/photo-1531415074968-036ba1b575da?w=600&auto=format&fit=crop",
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&auto=format&fit=crop"  // नेचर बैकअप
            ];
            const randomBackup = backupImages[Math.floor(Math.random() * backupImages.length)];
            image.src = randomBackup;
            image.onerror = null; // इनफिनिट लूप रोकने के लिए
        }

        // डायरेक्ट व्हाट्सएप और मोबाइल शेयर सिस्टम
        function shareImage(url) {
            if (navigator.share) {
                navigator.share({ title: 'PicWorld HD Image', url: url }).catch(console.error);
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent('PicWorld पर यह धांसू फोटो देखो: ' + url)}`, '_blank');
            }
        }

        function quickSearch(tag) {
            searchInput.value = tag;
            fetchLiveImages(tag);
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = searchInput.value.trim();
            if (val) fetchLiveImages(val);
        });

        // पहली बार वेबसाइट खुलने पर अपने आप भारतीय क्रिकेट की शानदार फोटोज़ आ जाएँगी
        window.onload = () => {
            fetchLiveImages('Indian cricket team match');
        };
    </script>
</body>
    </html>
