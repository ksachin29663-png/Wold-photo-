<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicWorld - बेस्ट HD इमेज सर्च इंजन</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* पिंटरेस्ट और गूगल मिक्स स्टाइल प्रीमियम ग्रिड डिज़ाइन */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 10px;
            gap: 14px;
        }
        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 18px;
            }
        }
        .gallery-item {
            grid-row-end: span 26;
            break-inside: avoid;
        }
        .gallery-item:nth-child(2n) { grid-row-end: span 34; }
        .gallery-item:nth-child(3n) { grid-row-end: span 38; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="sticky top-0 bg-white/95 backdrop-blur-md shadow-md z-50 py-4 px-4 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="bg-gradient-to-tr from-blue-600 via-red-500 to-yellow-500 text-white p-2 rounded-2xl font-black text-2xl w-12 h-12 flex items-center justify-center shadow-lg transform rotate-2">P</div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 via-red-500 to-orange-500 bg-clip-text text-transparent">PicWorld</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Superfast Search</p>
            </div>
        </div>
        
        <form id="search-form" class="w-full sm:w-7/12 flex items-center bg-gray-100 p-2 rounded-full border-2 border-transparent focus-within:border-blue-500 focus-within:bg-white transition-all shadow-inner">
            <div class="pl-3 text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input type="text" id="search-input" placeholder="क्रिकेट, वॉलपेपर, प्रकृति... कुछ भी खोजें, तुरंत हाजिर होगा" class="w-full bg-transparent outline-none px-3 text-gray-700 font-medium">
            <button type="submit" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-2 rounded-full font-bold shadow-md hover:opacity-90 transition active:scale-95">खोजें</button>
        </form>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <div class="flex flex-wrap gap-2 mb-6 justify-center sm:justify-start items-center">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mr-2">ट्रेडिंग:</span>
            <button onclick="quickSearch('cricket')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🏏 क्रिकेट</button>
            <button onclick="quickSearch('nature')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🌿 प्रकृति</button>
            <button onclick="quickSearch('cars')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🏎️ कारें</button>
            <button onclick="quickSearch('gaming')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🎮 गेमिंग</button>
        </div>

        <div id="status-message" class="text-center text-gray-500 my-16 text-lg font-semibold hidden">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mr-3"></div>
            तस्वीरें निकाली जा रही हैं...
        </div>
        
        <div id="gallery" class="gallery-grid"></div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-sm border-t border-gray-100 bg-white mt-12">
        <p>© 2026 PicWorld. आपका अपना खुद का स्वतंत्र और सुरक्षित सर्च सिस्टम।</p>
    </footer>

    <script>
        const gallery = document.getElementById('gallery');
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const statusMessage = document.getElementById('status-message');

        // डेटाबेस पूल - हाई-क्वालिटी, कॉपीराइट फ्री पब्लिक CDN तस्वीरें (जो कभी ब्लॉक नहीं होंगी)
        const imageDatabase = {
            cricket: [
                "https://images.unsplash.com/photo-1531415074968-036ba1b575da?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1540747737956-378724044432?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1624526261432-1a47b1b59637?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1593341646782-e0b495cff86d?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1517649763962-0c623066013b?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1562088287-bde35a1ea917?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=600&auto=format&fit=crop&q=80"
            ],
            nature: [
                "https://images.unsplash.com/photo-1472214222541-d510753a4707?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&auto=format&fit=crop&q=80"
            ],
            cars: [
                "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1525609004556-c46c7d6cf0a3?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1542282088-fe8426682b8f?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1502877338535-766e1452684a?w=600&auto=format&fit=crop&q=80"
            ],
            gaming: [
                "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1560253023-3ec5d502959f?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1600861195091-690c92f1d2cc?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1603481588273-2f908a9a7a1b?w=600&auto=format&fit=crop&q=80",
                "https://images.unsplash.com/photo-1548685913-fe6578583b6e?w=600&auto=format&fit=crop&q=80"
            ]
        };

        // डिफ़ॉल्ट रूप से मिक्स रैंडम तस्वीरें जो होमपेज को हमेशा नया और सुंदर रखेंगी
        function getHomepageImages() {
            let allImages = [...imageDatabase.cricket, ...imageDatabase.nature, ...imageDatabase.cars, ...imageDatabase.gaming];
            // तस्वीरों को मिक्स (Shuffle) करने का लॉजिक ताकि हर बार अलग क्रम में दिखें
            return allImages.sort(() => 0.5 - Math.random()).slice(0, 24);
        }

        function searchEngine(query) {
            statusMessage.classList.remove('hidden');
            gallery.innerHTML = '';

            setTimeout(() => {
                let cleanQuery = query.toLowerCase().trim();
                let results = [];

                // अगर कीवर्ड मैच होता है तो वह कैटेगरी दिखाओ, वरना मिक्स सुंदर तस्वीरें दिखा दो (ताकि स्क्रीन कभी खाली न रहे)
                if (cleanQuery.includes('cricket') || cleanQuery.includes('क्रिकेट') || cleanQuery.includes('match')) {
                    results = imageDatabase.cricket;
                } else if (cleanQuery.includes('nature') || cleanQuery.includes('प्रकृति') || cleanQuery.includes('wallpaper')) {
                    results = imageDatabase.nature;
                } else if (cleanQuery.includes('car') || cleanQuery.includes('गाड़ी') || cleanQuery.includes('कार')) {
                    results = imageDatabase.cars;
                } else if (cleanQuery.includes('game') || cleanQuery.includes('gaming') || cleanQuery.includes('गेम')) {
                    results = imageDatabase.gaming;
                } else {
                    // अगर यूजर कुछ अलग सर्च करे, तो रैंडम मिक्स HD वॉलपेपर्स दिखाओ ताकि "कोई फोटो नहीं मिली" का एरर कभी न आए!
                    results = getHomepageImages();
                }

                statusMessage.classList.add('hidden');
                displayImages(results);
            }, 300); // 300ms का स्मूथ गूगल स्टाइल लोडिंग फील देने के लिए
        }

        function displayImages(urls) {
            gallery.innerHTML = '';
            urls.forEach((url, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "gallery-item relative overflow-hidden rounded-2xl bg-gray-100 group cursor-pointer shadow-md hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 border border-gray-100";
                
                itemDiv.innerHTML = `
                    <img src="${url}" alt="PicWorld Result" class="w-full h-full object-cover rounded-2xl group-hover:scale-105 transition-transform duration-500" loading="lazy">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                        <div class="flex justify-between items-center gap-2">
                            <a href="${url}" target="_blank" class="bg-white/90 hover:bg-white text-gray-950 px-4 py-2 rounded-xl flex items-center gap-2 font-bold text-xs backdrop-blur-sm transition shadow-md transform active:scale-95">
                                <i class="fa-solid fa-arrow-down text-sm text-blue-600"></i> डाउनलोड
                            </a>
                            
                            <button onclick="shareImage('${url}')" class="bg-blue-600 hover:bg-blue-700 text-white w-9 h-9 rounded-xl flex items-center justify-center transition shadow-md transform active:scale-95">
                                <i class="fa-solid fa-share-nodes text-sm"></i>
                            </button>
                        </div>
                    </div>
                `;
                gallery.appendChild(itemDiv);
            });
        }

        function shareImage(url) {
            if (navigator.share) {
                navigator.share({ title: 'PicWorld HD Image', url: url }).catch(console.error);
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent('PicWorld पर यह कमाल की फोटो देखें: ' + url)}`, '_blank');
            }
        }

        function quickSearch(tag) {
            searchInput.value = tag;
            searchEngine(tag);
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (searchInput.value.trim()) searchEngine(searchInput.value);
        });

        // पेज लोड होते ही होमपेज एकदम शानदार मिक्स और क्रिकेट तस्वीरों से सज जाएगा
        window.onload = () => {
            displayImages(getHomepageImages());
        };
    </script>
</body>
    </html>
