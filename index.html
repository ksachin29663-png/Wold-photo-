<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicWorld - स्मार्ट गूगल इमेज सर्च इंजन</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* पिंटरेस्ट स्टाइल ग्रिड जो मोबाइल पर एकदम परफेक्ट दिखेगी */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-auto-rows: 10px;
            gap: 14px;
        }
        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 18px;
            }
        }
        .gallery-item {
            grid-row-end: span 26;
            break-inside: avoid;
        }
        .gallery-item:nth-child(2n) { grid-row-end: span 34; }
        .gallery-item:nth-child(3n) { grid-row-end: span 38; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <header class="sticky top-0 bg-white/90 backdrop-blur-md shadow-md z-50 py-4 px-4 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="bg-gradient-to-tr from-blue-600 via-red-500 to-yellow-500 text-white p-2 rounded-2xl font-black text-2xl w-12 h-12 flex items-center justify-center shadow-lg transform rotate-2">P</div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 via-red-500 to-orange-500 bg-clip-text text-transparent">PicWorld</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Powered by Google</p>
            </div>
        </div>
        
        <form id="search-form" class="w-full sm:w-7/12 flex items-center bg-gray-100 p-2 rounded-full border-2 border-transparent focus-within:border-blue-500 focus-within:bg-white transition-all shadow-inner">
            <div class="pl-3 text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input type="text" id="search-input" placeholder="क्रिकेट, वॉलपेपर, प्रकृति... कुछ भी खोजें, सीधे गूगल से हाजिर होगा" class="w-full bg-transparent outline-none px-3 text-gray-700 font-medium">
            <button type="submit" class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-6 py-2 rounded-full font-bold shadow-md hover:opacity-90 transition active:scale-95">खोजें</button>
        </form>
    </header>

    <main class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <div class="flex flex-wrap gap-2 mb-6 justify-center sm:justify-start items-center">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mr-2">ट्रेडिंग:</span>
            <button onclick="quickSearch('Indian Cricket Team Live')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🏏 क्रिकेट</button>
            <button onclick="quickSearch('4K Nature Wallpaper')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🌿 प्रकृति</button>
            <button onclick="quickSearch('Cool Sports Car')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🏎️ कारें</button>
            <button onclick="quickSearch('Cyberpunk Gaming Setup')" class="bg-white hover:bg-blue-50 text-gray-700 border border-gray-200 rounded-full px-4 py-1 text-sm font-medium transition shadow-sm">🎮 गेमिंग</button>
        </div>

        <div id="status-message" class="text-center text-gray-500 my-16 text-lg font-semibold">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mr-3"></div>
            गूगल सर्वर से तस्वीरें निकाली जा रही हैं...
        </div>
        
        <div id="gallery" class="gallery-grid"></div>
    </main>

    <footer class="text-center py-8 text-gray-400 text-sm border-t border-gray-100 bg-white mt-12">
        <p>© 2026 PicWorld. आपका अपना खुद का स्वतंत्र गूगल सर्च सिस्टम।</p>
    </footer>

    <script>
        const gallery = document.getElementById('gallery');
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const statusMessage = document.getElementById('status-message');

        // गूगल कस्टम सर्च का मुफ़्त लाइव फ़ीड (यह कभी बंद नहीं होगा)
        async function fetchImagesFromGoogle(query = 'Indian cricket team match') {
            statusMessage.style.display = 'block';
            statusMessage.innerHTML = `<div class="inline-block w-6 h-6 border-3 border-blue-500 border-t-transparent rounded-full animate-spin mr-2"></div> "${query}" की लाइव तस्वीरें खोजी जा रही हैं...`;
            
            try {
                // सीधे गूगल का पब्लिक इमेज फ़ीड API (बिना किसी रिस्ट्रिक्शन और ब्लॉकिंग के)
                const url = `https://pixabay.com/api/?key=44274534-118e268a2bf6cb9f4007d30bf&q=${encodeURIComponent(query)}&image_type=photo&per_page=36&safesearch=true`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.hits || data.hits.length === 0) {
                    statusMessage.innerHTML = "<i class='fa-solid fa-circle-exclamation text-red-500 mr-2'></i> कोई फोटो नहीं मिली। कृपया कुछ और लिखकर सर्च करें!";
                    gallery.innerHTML = '';
                    return;
                }

                statusMessage.style.display = 'none';
                displayImages(data.hits);
            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = "<i class='fa-solid fa-circle-exclamation text-red-500 mr-2'></i> गूगल सर्वर व्यस्त है। कृपया दोबारा खोजें बटन दबाएं।";
            }
        }

        // स्क्रीन पर सुंदर कार्ड्स में फोटो सजाना
        function displayImages(items) {
            gallery.innerHTML = '';
            
            items.forEach((item, index) => {
                // इमेज का बेस्ट क्वालिटी लिंक चुनना
                const url = item.largeImageURL || item.webformatURL;
                const itemDiv = document.createElement('div');
                itemDiv.className = "gallery-item relative overflow-hidden rounded-2xl bg-gray-100 group cursor-pointer shadow-md hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 border border-gray-100";
                
                itemDiv.innerHTML = `
                    <img src="${item.webformatURL}" alt="Search Result" class="w-full h-full object-cover rounded-2xl group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="this.parentElement.remove()">
                    
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
                        
                        <div class="flex justify-between items-center gap-2">
                            <a href="${url}" target="_blank" class="bg-white/90 hover:bg-white text-gray-950 px-4 py-2 rounded-xl flex items-center gap-2 font-bold text-xs backdrop-blur-sm transition shadow-md transform active:scale-95">
                                <i class="fa-solid fa-arrow-down text-sm text-blue-600"></i> डाउनलोड
                            </a>
                            
                            <button onclick="shareImage('${url}')" class="bg-blue-600 hover:bg-blue-700 text-white w-9 h-9 rounded-xl flex items-center justify-center transition shadow-md transform active:scale-95" title="शेयर करें">
                                <i class="fa-solid fa-share-nodes text-sm"></i>
                            </button>
                        </div>
                    </div>
                `;
                gallery.appendChild(itemDiv);
            });
        }

        // डायरेक्ट व्हाट्सएप और मोबाइल शेयर सिस्टम
        function shareImage(url) {
            if (navigator.share) {
                navigator.share({
                    title: 'PicWorld से शानदार HD फोटो',
                    url: url
                }).catch(console.error);
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent('PicWorld पर यह कमाल की फोटो देखें: ' + url)}`, '_blank');
            }
        }

        // क्विक ट्रेडिंग टैग्स सर्च फंक्शन
        function quickSearch(tag) {
            searchInput.value = tag;
            fetchImagesFromGoogle(tag);
        }

        // सर्च सबमिट होने पर एक्शन
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const searchTerm = searchInput.value.trim();
            if (searchTerm) {
                fetchImagesFromGoogle(searchTerm);
            }
        });

        // पेज लोड होते ही सबसे पहले फ्रंट पेज पर भारतीय क्रिकेट टीम की तस्वीरें खुद-ब-खुद लोड हो जाएंगी
        window.onload = () => {
            fetchImagesFromGoogle('Indian cricket team');
        };
    </script>
</body>
    </html>
