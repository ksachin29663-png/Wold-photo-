openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: search
    description: Image search operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /search:
    get:
      operationId: searchImages
      tags: [search]
      summary: Search for images using Unsplash
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ImageItem:
      type: object
      properties:
        url:
          type: string
        fullUrl:
          type: string
        thumb:
          type: string
        alt:
          type: string
      required:
        - url
        - fullUrl
        - thumb
        - alt
    SearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
        totalPages:
          type: integer
        total:
          type: integer
      required:
        - results
        - totalPages
        - total
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/ImageItem"
      required:
        - error
