<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>एडमिन पैनल - Photo World Online</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <header>
        <div class="logo">Photo World - एडमिन कंट्रोल</div>
    </header>

    <main class="admin-container" style="max-width: 500px; margin: 30px auto; padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <div id="auth-box">
            <h2 style="text-align: center; margin-bottom: 20px; color: #333;">🔒 एडमिन वेरिफिकेशन</h2>
            <p style="font-size: 14px; color: #666; text-align: center; margin-bottom: 20px;">वेबसाइट को अनलॉक करने के लिए अपनी सीक्रेट एडमिन ईमेल डालें।</p>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="email" id="admin-email" placeholder="अपनी ईमेल यहाँ लिखें..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>
            <button onclick="verifyAdmin()" style="width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">वेरीफाई और अनलॉक करें</button>
        </div>

        <div id="upload-box" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #222;">📸 नई पोस्ट लाइव करें</h2>
            <form id="upload-form">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #444;">एक फोटो चुनें:</label>
                    <input type="file" id="post-image" accept="image/*" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #444;">शीर्षक (Title):</label>
                    <input type="text" id="post-title" required placeholder="पोस्ट का नाम लिखें..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #444;">लोकेशन (Location):</label>
                    <input type="text" id="post-location" placeholder="जैसे: Lucknow, Uttar Pradesh" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #444;">विवरण (Description):</label>
                    <textarea id="post-desc" rows="4" placeholder="इस फोटो के बारे में कुछ लिखें..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; resize: none;"></style></textarea>
                </div>
                <button type="submit" id="submit-btn" style="width: 100%; padding: 14px; background: #28a745; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">वेबीसाइट पर लाइव करें</button>
            </form>
        </div>

    </main>

    <script src="app.js"></script>
    <script>
        // मास्टर एडमिन ईमेल चेकर फंक्शन
        function verifyAdmin() {
            const emailInput = document.getElementById("admin-email").value.trim();
            const masterEmail = "ksachin29663@gmail.com";

            if (emailInput === masterEmail) {
                alert("अनलॉक हो गया! स्वागत है सचिन भाई। 🎉");
                document.getElementById("auth-box").style.display = "none";
                document.getElementById("upload-box").style.display = "block";
            } else {
                alert("🚨 एक्सेस डिनाइड: यह ईमेल एडमिन लिस्ट में नहीं है!");
            }
        }
    </script>
</body>
</html>
