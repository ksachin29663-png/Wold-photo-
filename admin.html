<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo World Online - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo">Master Control Room</div>
    </header>

    <main class="feed-container">
        
        <div id="lock-screen" class="admin-form">
            <h2 style="margin-bottom: 10px; font-size: 18px; text-align: center;">⚡ एडमिन वेरिफिकेशन</h2>
            <p style="font-size: 13px; color: #606060; text-align: center; margin-bottom: 20px;">आगे बढ़ने के लिए अपना सीक्रेट मास्टर ईमेल दर्ज करें।</p>
            
            <div class="form-group">
                <label>मास्टर ईमेल एड्रेस</label>
                <input type="email" id="admin-email-input" placeholder="example@email.com" required>
            </div>
            <button class="btn-submit" type="button" onclick="verifyAdminEmail()">वेरीफाई और अनलॉक करें</button>
        </div>

        <div id="admin-main-form" class="admin-form" style="display: none;">
            <h2 style="margin-bottom: 20px; font-size: 18px; color: #0f0f0f;">नयी फोटो और कहानी लाइव करें</h2>
            
            <form id="upload-form">
                <div class="form-group">
                    <label>फोटो खींचें या चुनें</label>
                    <input type="file" id="post-image" accept="image/*" required>
                </div>
                
                <div class="form-group">
                    <label>शीर्षक (Title)</label>
                    <input type="text" id="post-title" placeholder="जैसे: खूबसूरत शाम" required>
                </div>
                
                <div class="form-group">
                    <label>लोकेशन (📍 कहाँ की फोटो है?)</label>
                    <input type="text" id="post-location" placeholder="जैसे: लखनऊ, उत्तर प्रदेश" required>
                </div>
                
                <div class="form-group">
                    <label>इसके बारे में लिखें (कहानी/अनुभव)</label>
                    <textarea id="post-desc" rows="5" placeholder="यहाँ अपनी कहानी टाइप करें..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit" id="submit-btn" style="background: #0f0f0f;">वेबसाइट पर लाइव करें</button>
            </form>
        </div>
    </main>

    <script>
        function verifyAdminEmail() {
            // 1. इनपुट बॉक्स से ईमेल उठाओ
            const inputField = document.getElementById("admin-email-input");
            const userEnteredEmail = inputField.value.trim().toLowerCase();
            
            // 2. तुम्हारी वह खास सीक्रेट ईमेल जो कोड के अंदर सेव है
            const SECRET_MASTER_EMAIL = "ksachin29663@gmail.com"; 

            // 3. यहाँ है असली दिमाग - ईमेल मैच करना
            if (userEnteredEmail === SECRET_MASTER_EMAIL) {
                // अगर ईमेल मैच हो गई, तो लॉक स्क्रीन छुपाओ और फॉर्म दिखाओ
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("admin-main-form").style.display = "block";
            } else {
                // अगर मैच नहीं हुई, तो एरर दिखाओ
                alert("💥 एक्सेस डिनाइड! यह ईमेल एडमिन से मैच नहीं करती।");
            }
        }
    </script>

    <script src="app.js"></script>
</body>
</html>
